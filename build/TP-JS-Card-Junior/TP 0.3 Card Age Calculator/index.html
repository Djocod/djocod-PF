<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Age calculator app</title>
    <link rel="stylesheet" href="./style.css" />

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 11px;
        text-align: center;
      }

      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>

  <body>
    <main>
      <form action="">
        <div class="date-container">
          <div class="date day-container">
            <label for="day">Day</label>
            <input type="number" id="day" min="01" max="31" placeholder="DD" />
            <span class="error">Must be a valid day</span>
          </div>
          <div class="date month-container">
            <label for="month">Month</label>
            <input
              type="number"
              id="month"
              min="01"
              max="12"
              placeholder="MM"
            />
            <span class="error">Must be a valid month</span>
          </div>
          <div class="date year-container">
            <label for="year">Year</label>
            <input
              type="number"
              id="year"
              min="1900"
              max="2024"
              placeholder="YYYY"
            />
            <span class="error">Must be in the past</span>
          </div>
        </div>
      </form>
      <div class="arrow"></div>
      <div class="date-view-container">
        <div class="date-view view-year">
          <p><span>- -</span>years</p>
        </div>
        <div class="date-view view-month">
          <p><span>- -</span>months</p>
        </div>
        <div class="date-view view-day">
          <p><span>- -</span>days</p>
        </div>
      </div>
    </main>

    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </div> -->
    <script src="./index.js"></script>
  </body>
</html>
