<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Contact form</title>
  <link rel="stylesheet" href="./style.css">

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->

    .attribution {
      font-size: 11px;
      text-align: center;
    }
    
    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style> -->
</head>

<body>
  <main>
    <div class="alert">
      <div class="alert-title">
        <img src="./assets/images/icon-success-check.svg" alt="">
        <h3>Message Sent!</h3>
      </div>
      <p>Thanks for completing the form. We'll be in touch soon!</p>
    </div>
    <h1>Contact Us</h1>
    <form action="">
      <div class="name">
        <div class="firstName-container">
          <label for="firstName">First Name <span>*</span><input type="text" id="firstName"></label>
          <span></span>
        </div>
        <div class="lastName-container">
          <label for="lastName">Last Name <span>*</span><input type="text" id="lastName"></label>
          <span></span>
        </div>
      </div>
      <div class="email-container">
        <label for="email">Email Address <span>*</span><input type="email" id="email"></label>
        <span></span>
      </div>
      <div class="query-type">
        <legend>Query Type <span>*</span></legend>
        <div class="type-container typeG typeS">
          <div class="general typeG">
            <input type="radio" name="type" value="general" id="typeG">
            <label for="typeG">General Enquiry</label>
          </div>
          <div class="support typeS">
            <input type="radio" name="type" value="support" id="typeS">
            <label for="typeS">Support Request</label>
          </div>
          <span></span>
        </div>
      </div>
      <div class="text-container">
        <label for="text">Message <span>*</span></label>
        <textarea id="text"></textarea>
        <span></span>
      </div>
      <div class="cgv-container">
        <label for="cgv"><input type="checkbox" name="cgv" id="cgv">I consent to being contacted by the team
          <span>*</span></label>
        <span></span>
      </div>
      <button>Submit</button>
    </form>
  </main>

    Coded by <a href="#">Your Name Here</a>.
  </div> -->
  <script src="./index.js"></script>
</body>

</html>
